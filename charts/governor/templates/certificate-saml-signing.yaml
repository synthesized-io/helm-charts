{{- with .Values.api.saml }}
{{- if and .enabled (not .signing.external) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $.Values.api.name }}-saml-signing
  labels:
    app: {{ $.Values.api.name }}
    {{- include "governor.selectorLabels" $ | nindent 4 }}
spec:
  secretName: {{ .signing.keyPairSecret }}
  duration: {{ .signing.certManager.duration }}
  renewBefore: {{ .signing.certManager.renewBefore }}
  privateKey:
    algorithm: {{ .signing.certManager.privateKey.algorithm }}
    size: {{ .signing.certManager.privateKey.size }}
    encoding: {{ .signing.certManager.privateKey.encoding }}
  issuerRef:
    name: {{ .signing.certManager.issuerRef.name }}
    kind: {{ .signing.certManager.issuerRef.kind }}
{{- end }}
{{- end }}
