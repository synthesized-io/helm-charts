{{- $openShift := or .Values.openShiftEnabled (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.front.name }}
  labels:
    {{- include "governor.component.labels" (list .Values.front .) | nindent 4 }}
spec:
  replicas: {{ .Values.front.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.front.name }}
  template:
    metadata:
      labels:
        {{- include "governor.component.labels" (list .Values.front .) | nindent 8 }}
    spec:
      {{- if or $openShift .Values.tlsInternal.enabled }}
      initContainers:
        {{- if $openShift }}
        - name: init-frontend-assets
          image: "{{ .Values.front.image.repository }}:{{ .Values.front.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.front.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - cp -R /apps/governor/. /work/
          volumeMounts:
            - name: app-data
              mountPath: /work
        {{- end }}
        {{- if .Values.tlsInternal.enabled }}
        {{- include "governor.tlsInternal.initContainer" . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.front.imagePullSecrets | default .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.front.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.front.name }}
          image: "{{ .Values.front.image.repository }}:{{ .Values.front.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.front.image.pullPolicy }}
          {{- if .Values.front.container.command }}
          command:
            {{- toYaml .Values.front.container.command | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.front.container.port }}
          resources:
            {{- toYaml (.Values.front.resources | default dict) | nindent 12 }}
          {{- include "governor.component.envSources" .Values.front | nindent 10 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.front.container.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- if or $openShift .Values.front.container.extraVolumeMounts }}
          volumeMounts:
            {{- if $openShift }}
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: app-data
              mountPath: /apps/governor
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run/nginx
            {{- end }}
            {{- with .Values.front.container.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- if .Values.tlsInternal.enabled }}
        {{- include "governor.tlsInternal.sidecar" (dict "componentName" "front" "config" .Values.front "tlsInternal" .Values.tlsInternal "hasHttpPort" true "hasGrpcPort" false) | nindent 8 }}
        {{- end }}
      volumes:
        {{- if $openShift }}
        - name: nginx-config
          emptyDir: {}
        - name: app-data
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        {{- end }}
        {{- if .Values.tlsInternal.enabled }}
        {{- include "governor.tlsInternal.volumes" (dict "componentName" "front" "config" .Values.front "tlsInternal" .Values.tlsInternal) | nindent 8 }}
        {{- end }}
        {{- with .Values.front.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- include "governor.component.schedulingConstraints" . | nindent 6 }}
