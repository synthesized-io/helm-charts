
{{- if .Values.api.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.api.persistence.claimName }}
  labels:
    app: {{ .Values.api.name }}
    {{- include "governor.selectorLabels" . | nindent 4 }}
spec:
  {{- if .Values.api.persistence.storageClassName }}
  storageClassName: {{ .Values.api.persistence.storageClassName }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.api.persistence.size }}
{{- end }}
