apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.name }}
  labels:
    app: {{ .Values.api.name }}
    {{- include "governor.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.api.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.api.name }}
        {{- include "governor.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.api.saml }}
      {{- if and .enabled .idpMetadataConfigMap .idpMetadataSecret }}
      {{- fail "Only one of api.saml.idpMetadataConfigMap or api.saml.idpMetadataSecret may be set" }}
      {{- end }}
      {{- if and .enabled .signing.external (not .signing.keyPairSecret) }}
      {{- fail "api.saml.signing.keyPairSecret must be set when api.saml.signing.external=true" }}
      {{- end }}
      {{- if and .enabled .signing.external .signing.certManagerSecretName }}
      {{- fail "api.saml.signing.certManagerSecretName cannot be set when api.saml.signing.external=true" }}
      {{- end }}
      {{- if and .enabled (not .signing.external) (not .signing.certManagerSecretName) }}
      {{- fail "api.saml.signing.certManagerSecretName must be set when api.saml.signing.external=false" }}
      {{- end }}
      {{- if and .enabled (not .signing.external) .signing.keyPairSecret }}
      {{- fail "api.saml.signing.keyPairSecret cannot be set when api.saml.signing.external=false" }}
      {{- end }}
      {{- end }}
      {{- with .Values.api.imagePullSecrets | default .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.tlsInternal.enabled }}
      initContainers:
        {{- include "governor.tlsInternal.initContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.api.name }}
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- if .Values.api.container.command }}
          command:
{{ toYaml .Values.api.container.command | indent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.api.container.port }}
            - containerPort: {{ .Values.api.container.grpcPort }}
          resources:
            {{- toYaml .Values.api.resources | default "{}" | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Values.api.name }}-configmap
            - secretRef:
                name: {{ .Values.api.name }}-secret
          env:
            {{- range .Values.api.container.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .valueFrom.secretKeyRef.name }}
                  key: {{ .valueFrom.secretKeyRef.key }}
            {{- end}}
          readinessProbe:
            httpGet:
              path: /api/v1/healthy
              port: {{ .Values.api.container.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- if or .Values.api.persistence.enabled .Values.tlsInternal.enabled .Values.api.container.extraVolumeMounts .Values.api.saml.enabled }}
          volumeMounts:
            {{- if .Values.api.persistence.enabled }}
            - name: {{ .Values.api.persistence.name }}
              mountPath: {{ .Values.api.persistence.mountPath }}
            {{- end }}
            {{- with .Values.api.saml }}
            {{- if and .enabled (or .idpMetadataConfigMap .idpMetadataSecret) }}
            - name: saml-idp-metadata
              mountPath: {{ .metadataMountPath | default "/etc/governor/saml/idp-metadata" }}
              readOnly: true
            {{- end }}
            {{- if and .enabled (or .signing.keyPairSecret .signing.certManagerSecretName) }}
            - name: saml-signing-keypair
              mountPath: {{ .signing.mountPath | default "/etc/governor/saml/signing" }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- with .Values.api.container.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- if .Values.tlsInternal.enabled }}
        {{- include "governor.tlsInternal.sidecar" (dict "componentName" "api" "config" .Values.api "tlsInternal" .Values.tlsInternal "hasHttpPort" true "hasGrpcPort" true) | nindent 8 }}
        {{- end }}
      {{- if or .Values.api.persistence.enabled .Values.tlsInternal.enabled .Values.api.extraVolumes .Values.api.saml.enabled }}
      volumes:
        {{- if .Values.api.persistence.enabled }}
        - name: {{ .Values.api.persistence.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.api.persistence.claimName }}
        {{- end }}
        {{- if .Values.tlsInternal.enabled }}
        {{- include "governor.tlsInternal.volumes" (dict "componentName" "api" "config" .Values.api "tlsInternal" .Values.tlsInternal) | nindent 8 }}
        {{- end }}
        {{- with .Values.api.saml }}
        {{- if and .enabled (or .idpMetadataConfigMap .idpMetadataSecret) }}
        - name: saml-idp-metadata
          {{- if .idpMetadataConfigMap }}
          configMap:
            name: {{ .idpMetadataConfigMap }}
            items:
              - key: {{ .metadataKey | default "metadata.xml" }}
                path: {{ .metadataKey | default "metadata.xml" }}
          {{- else }}
          secret:
            secretName: {{ .idpMetadataSecret }}
            items:
              - key: {{ .metadataKey | default "metadata.xml" }}
                path: {{ .metadataKey | default "metadata.xml" }}
          {{- end }}
        {{- end }}
        {{- if and .enabled (or .signing.keyPairSecret .signing.certManagerSecretName) }}
        - name: saml-signing-keypair
          secret:
            secretName: {{ .signing.keyPairSecret | default .signing.certManagerSecretName }}
            items:
              - key: {{ .signing.privateKeyKey | default "tls.key" }}
                path: {{ .signing.privateKeyKey | default "tls.key" }}
              - key: {{ .signing.certificateKey | default "tls.crt" }}
                path: {{ .signing.certificateKey | default "tls.crt" }}
        {{- end }}
        {{- end }}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
