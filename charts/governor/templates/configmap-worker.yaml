apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.agent.name }}-configmap
  labels:
    {{- include "governor.selectorLabels" . | nindent 4 }}
data:
{{- if .Values.agent.container.config }}
{{- if .Values.tlsInternal.enabled }}
  # Override API connection to use local Envoy egress
  AGENT_SERVERHOST: '127.0.0.1'
  AGENT_SERVERPORT: '{{ .Values.tlsInternal.ports.egressGrpc }}'
  AGENT_USEPLAINTEXT: "true"
  # Include other config values except the server connection ones
  {{- range $key, $value := .Values.agent.container.config }}
  {{- if and (ne $key "AGENT_SERVERHOST") (ne $key "AGENT_SERVERPORT") (ne $key "AGENT_USEPLAINTEXT") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- else }}
{{ toYaml .Values.agent.container.config | indent 2}}
{{- end }}
{{- end }}
{{- if .Values.agent.persistence.enabled }}
  TDK_WORKINGDIRECTORY_ENABLED: "true"
  TDK_WORKING_DIRECTORY_PATH: {{ printf "%s/storage" .Values.agent.persistence.mountPath | quote }}
  AGENT_WORKING_DIRECTORY_PATH: {{ printf "%s/storage" .Values.agent.persistence.mountPath | quote }}
{{- else }}
  TDK_WORKINGDIRECTORY_ENABLED: "false"
{{- end }}
  {{- with .Values.s3Client }}
  {{- if .forcePathStyle }}
  TDK_S3_FORCE_PATH_STYLE: {{ .forcePathStyle | quote }}
  {{- end }}
  {{- if .protocol }}
  TDK_S3_PROTOCOL: {{ .protocol | quote }}
  {{- end }}
  {{- if .region }}
  TDK_S3_REGION: {{ .region | quote }}
  {{- end }}
  {{- if .endpoint }}
  TDK_S3_ENDPOINT: {{ .endpoint | quote }}
  {{- end }}
  {{- end }}
