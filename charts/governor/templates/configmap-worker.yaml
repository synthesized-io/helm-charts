{{- $w := include "governor.workerValues" . | fromYaml -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $w.name }}-configmap
  labels:
    {{- include "governor.selectorLabels" . | nindent 4 }}
data:
{{- if $w.container.config }}
{{- if .Values.tlsInternal.enabled }}
  # Override API connection to use local Envoy egress
  WORKER_SERVERHOST: '127.0.0.1'
  WORKER_SERVERPORT: '{{ .Values.tlsInternal.ports.egressGrpc }}'
  WORKER_USEPLAINTEXT: "true"
  # Include other config values except the server connection ones
  {{- range $key, $value := $w.container.config }}
  {{- if and (ne $key "WORKER_SERVERHOST") (ne $key "WORKER_SERVERPORT") (ne $key "WORKER_USEPLAINTEXT") (ne $key "AGENT_SERVERHOST") (ne $key "AGENT_SERVERPORT") (ne $key "AGENT_USEPLAINTEXT") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- else }}
{{ toYaml $w.container.config | indent 2}}
{{- end }}
{{- end }}
{{- if $w.persistence.enabled }}
  TDK_WORKINGDIRECTORY_ENABLED: "true"
  TDK_WORKING_DIRECTORY_PATH: {{ printf "%s/storage" $w.persistence.mountPath | quote }}
  WORKER_WORKING_DIRECTORY_PATH: {{ printf "%s/storage" $w.persistence.mountPath | quote }}
{{- else }}
  TDK_WORKINGDIRECTORY_ENABLED: "false"
{{- end }}
  {{- with .Values.s3Client }}
  {{- if .forcePathStyle }}
  TDK_S3_FORCE_PATH_STYLE: {{ .forcePathStyle | quote }}
  {{- end }}
  {{- if .protocol }}
  TDK_S3_PROTOCOL: {{ .protocol | quote }}
  {{- end }}
  {{- if .region }}
  TDK_S3_REGION: {{ .region | quote }}
  {{- end }}
  {{- if .endpoint }}
  TDK_S3_ENDPOINT: {{ .endpoint | quote }}
  {{- end }}
  {{- end }}
