{{- if .Values.assistant.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.assistant.name }}
  labels:
    app: {{ .Values.assistant.name }}
    {{- include "governor.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.assistant.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.assistant.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.assistant.name }}
        {{- include "governor.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.assistant.imagePullSecrets | default .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.assistant.name }}
          image: "{{ .Values.assistant.image.repository }}:{{ .Values.assistant.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.assistant.image.pullPolicy }}
          {{- with .Values.assistant.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.assistant.container.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.assistant.container.port }}
          resources:
            {{- toYaml .Values.assistant.resources | default "{}" | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Values.assistant.name }}-configmap
            - secretRef:
                name: {{ .Values.assistant.name }}-secret
          {{- with .Values.assistant.container.secretEnv }}
          env:
            {{- range . }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .valueFrom.secretKeyRef.name }}
                  key: {{ .valueFrom.secretKeyRef.key }}
            {{- end }}
          {{- end }}
          readinessProbe:
            {{- if .Values.assistant.readinessProbe }}
            {{- toYaml .Values.assistant.readinessProbe | nindent 12 }}
            {{- else }}
            tcpSocket:
              port: {{ .Values.assistant.container.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            {{- end }}
          livenessProbe:
            {{- if .Values.assistant.livenessProbe }}
            {{- toYaml .Values.assistant.livenessProbe | nindent 12 }}
            {{- else }}
            tcpSocket:
              port: {{ .Values.assistant.container.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
            {{- end }}
          {{- with .Values.assistant.container.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.assistant.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
