apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.api.name }}-configmap
  labels:
    {{- include "governor.selectorLabels" . | nindent 4 }}
data:
{{- if .Values.api.container.config }}
{{ toYaml .Values.api.container.config | indent 2 }}
{{- end }}
  {{- with .Values.api.saml }}
  {{- if .enabled }}
  {{- $registrationId := .registrationId }}
  {{- $registrationUpper := $registrationId | upper }}
  {{- $metadataMountPath := .metadataMountPath }}
  {{- $metadataKey := .metadataKey }}
  {{- $metadataUri := .idpMetadataUrl }}
  {{- if or .idpMetadataConfigMap .idpMetadataSecret }}
  {{- $metadataUri = printf "file:%s/%s" $metadataMountPath $metadataKey }}
  {{- end }}
  {{- $signingMountPath := .signing.mountPath }}
  {{- $privateKeyKey := .signing.keyPairSecret.privateKey }}
  {{- $certificateKey := .signing.keyPairSecret.certificate }}
  SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_{{ $registrationUpper }}_ENTITY_ID: {{ required "saml.entityId is required when saml.enabled=true" .entityId | quote }}
  SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_{{ $registrationUpper }}_ACS_LOCATION: {{ required "saml.acsUrl is required when saml.enabled=true" .acsUrl | quote }}
  SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_{{ $registrationUpper }}_ASSERTINGPARTY_METADATA_URI: {{ required "One of saml.idpMetadataUrl or saml.idpMetadataConfigMap/idpMetadataSecret is required when saml.enabled=true" $metadataUri | quote }}
  {{- if .signing.keyPairSecret.name }}
  SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_{{ $registrationUpper }}_SIGNING_CREDENTIALS_0_PRIVATE_KEY_LOCATION: {{ printf "file:%s/%s" $signingMountPath $privateKeyKey | quote }}
  SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_{{ $registrationUpper }}_SIGNING_CREDENTIALS_0_CERTIFICATE_LOCATION: {{ printf "file:%s/%s" $signingMountPath $certificateKey | quote }}
  {{- end }}
  {{- if .governor.defaultRegistrationId }}
  GOVERNOR_SECURITY_SAML_DEFAULT_REGISTRATION_ID: {{ .governor.defaultRegistrationId | quote }}
  {{- end }}
  {{- if .governor.jwtRedirectUrl }}
  SPRING_SECURITY_SAML2_JWT_REDIRECT_URL: {{ .governor.jwtRedirectUrl | quote }}
  {{- end }}
  {{- if hasKey .governor "sloEnabled" }}
  GOVERNOR_SECURITY_SAML_SLO_ENABLED: {{ .governor.sloEnabled | quote }}
  {{- end }}
  GOVERNOR_SECURITY_SAML_AUTHORITIES_ENABLED: {{ .governor.authorities.enabled | quote }}
  {{- if .governor.authorities.groupAttribute }}
  GOVERNOR_SECURITY_SAML_AUTHORITIES_GROUP_ATTRIBUTE: {{ .governor.authorities.groupAttribute | quote }}
  {{- end }}
  GOVERNOR_SECURITY_SAML_AUTHORITIES_CONVERT_TO_UPPER_CASE: {{ .governor.authorities.convertToUpperCase | quote }}
  {{- if .governor.authorities.defaultRole }}
  GOVERNOR_SECURITY_SAML_AUTHORITIES_DEFAULT_ROLE: {{ .governor.authorities.defaultRole | quote }}
  {{- end }}
  {{/*
    Group-to-role mapping. Two input shapes are supported:

    * `aliases` (preferred): list of {group, role} pairs. Rendered as indexed env
      vars that bind cleanly through Spring's relaxed environment-variable rules.

    * `roleAliases` (legacy): map of group→role. Cannot be expressed as
      individual env vars because Spring's binder cannot enumerate descendants
      of a Map property whose prefix contains a hyphen (`role-aliases`). We
      therefore render this map as a single SPRING_APPLICATION_JSON entry,
      which Spring loads via its JSON property source — original keys preserved.

    Both shapes are merged on the application side; safe to use either or both.
  */}}
  {{- range $idx, $entry := .governor.authorities.aliases }}
  GOVERNOR_SECURITY_SAML_AUTHORITIES_ALIASES_{{ $idx }}_GROUP: {{ required "saml.governor.authorities.aliases[].group is required" $entry.group | quote }}
  GOVERNOR_SECURITY_SAML_AUTHORITIES_ALIASES_{{ $idx }}_ROLE:  {{ required "saml.governor.authorities.aliases[].role is required" $entry.role | quote }}
  {{- end }}
  {{- if .governor.authorities.roleAliases }}
  SPRING_APPLICATION_JSON: {{ dict "governor" (dict "security" (dict "saml" (dict "authorities" (dict "role-aliases" .governor.authorities.roleAliases)))) | toJson | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- $tdkW := include "governor.tdkWorkersValues" . | fromYaml }}
  UI_TDK_AGENTS: {{ $tdkW.enabled | quote }}
  UI_TDK_AGENTS_BY_DEFAULT: {{ $tdkW.useByDefault | quote }}
  {{- with .Values.s3Client }}
  {{- if .forcePathStyle }}
  TDK_S3_FORCE_PATH_STYLE: {{ .forcePathStyle | quote }}
  {{- end }}
  {{- if .protocol }}
  TDK_S3_PROTOCOL: {{ .protocol | quote }}
  {{- end }}
  {{- if .region }}
  TDK_S3_REGION: {{ .region | quote }}
  {{- end }}
  {{- if .endpoint }}
  TDK_S3_ENDPOINT: {{ .endpoint | quote }}
  {{- end }}
  {{- end }}
{{- if .Values.api.persistence.enabled }}
  TDK_WORKINGDIRECTORY_ENABLED: "true"
  TDK_WORKING_DIRECTORY_PATH: {{ printf "%s/storage" .Values.api.persistence.mountPath | quote }}
{{- else }}
  TDK_WORKINGDIRECTORY_ENABLED: "false"
{{- end }}
{{- if eq .Values.mode "saas" }}
  DIRECTOR_SERVERHOST: "{{ .Values.director.name }}"
  DIRECTOR_SERVERPORT: "{{ .Values.director.service.port }}"
  GOVERNOR_SECURITY_OWNERACCESSONLY: "yes"
{{- end }}
{{- if and .Values.serverHost (not (hasKey (.Values.api.container.config | default dict) "UI_SERVER_HOST")) }}
  UI_SERVER_HOST: {{ .Values.serverHost | quote }}
{{- end }}
{{- if .Values.analytics.posthog.apiHost }}
  UI_POSTHOG_ANALYTICS_API_HOST: {{ .Values.analytics.posthog.apiHost | quote }}
{{- end }}
