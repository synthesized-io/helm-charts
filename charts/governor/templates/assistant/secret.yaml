{{- if .Values.assistant.enabled }}
{{/*
Legacy inline secret, kept for parity with the other components. Prefer sourcing
sensitive values (ANTHROPIC_API_KEY, DATABASE_URL) via assistant.container.secretEnv
from an external secret. Rendered even when empty so the Deployment's envFrom
secretRef always resolves.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.assistant.name }}-secret
  labels:
    {{- include "governor.selectorLabels" . | nindent 4 }}
type: Opaque
data:
{{- range $k, $v := .Values.assistant.container.secretConfig }}
  {{ $k }}: {{ $v | b64enc | quote }}
{{- end }}
{{- end }}
