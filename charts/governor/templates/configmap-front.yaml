apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.front.name }}-configmap
  labels:
    {{- include "governor.selectorLabels" . | nindent 4 }}
data:
{{- if .Values.front.container.config }}
{{- if .Values.tlsInternal.enabled }}
  # Override API connection to use local Envoy egress
  API_INTERNAL_HOST: '127.0.0.1'
  API_HTTP_INTERNAL_PORT: '{{ .Values.tlsInternal.ports.egressHttp }}'
  API_GRPC_INTERNAL_PORT: '{{ .Values.tlsInternal.ports.egressGrpc }}'
  # Include other config values except the API connection ones
  {{- range $key, $value := .Values.front.container.config }}
  {{- if and (ne $key "API_INTERNAL_HOST") (ne $key "API_HTTP_INTERNAL_PORT") (ne $key "API_GRPC_INTERNAL_PORT") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- else }}
{{ toYaml .Values.front.container.config | indent 2}}
{{- end }}
{{- end }}
  {{- $tdkW := include "governor.tdkWorkersValues" . | fromYaml }}
  UI_TDK_AGENTS: {{ $tdkW.enabled | quote }}
  UI_TDK_AGENTS_BY_DEFAULT: {{ $tdkW.useByDefault | quote }}
{{- if .Values.analytics.posthog.apiHost }}
  UI_POSTHOG_ANALYTICS_API_HOST: {{ .Values.analytics.posthog.apiHost | quote }}
{{- end }}
{{- if eq .Values.mode "saas" }}
  UI_ENVIRONMENT: "cloud"
{{- else}}
  UI_ENVIRONMENT: "on-premise"
{{- end }}
