{{/*
LEGACY: This secret is kept for backward compatibility. Prefer using secretEnv
to source sensitive values from an external secret (e.g. Vault, External Secrets Operator).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.front.name }}-secret
  labels:
    {{- include "governor.selectorLabels" . | nindent 4 }}
type: Opaque
data:
{{- range $k, $v := .Values.front.container.secretConfig }}
  {{ $k }}: {{ $v | b64enc | quote }}
{{- end }}
