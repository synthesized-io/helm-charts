mode: self-hosted
sandbox: false
# Enables OpenShift-friendly mounts for nginx; auto-detected in templates via route.openshift.io.
openShiftEnabled: false

# Image used by the pre-upgrade migration cleanup hook (delete-only kubectl).
# Override `repository` / `tag` for airgapped environments where the default
# Docker Hub image is unavailable.
migrationCleanup:
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent
  # imagePullSecrets:  # falls back to top-level imagePullSecrets if unset
  #   - name: my-pull-secret
  #
  # When upgrading from a chart version that rendered the legacy `agent-pvc`
  # PVC, a pre-upgrade hook annotates it with `helm.sh/resource-policy: keep`
  # so Helm does not delete it during the rename (which would destroy the
  # worker's rocksdb state). The hook aborts the upgrade if the annotation
  # fails (e.g. RBAC denied, admission webhook), to prevent silent data loss.
  #
  # Set `deleteLegacyPvc: true` to opt out of this protection. The hook will
  # then skip the annotation and Helm will prune the legacy PVC during the
  # upgrade. Use this only when you do NOT need the existing worker data.
  deleteLegacyPvc: false

# Feature flags shared across components.
tdkWorkers:
  enabled: true
  useByDefault: true

# DEPRECATED: legacy `tdkAgents:` overrides are merged on top of `tdkWorkers:`
# (legacy values take precedence for any field they specify).
# tdkAgents: {}
s3Client:
  # forcePathStyle: true
  # protocol: "http"
  # region: "auto"
  # endpoint: "http://minio.governor.svc.cluster.local:9000"

# Envoy sidecar configuration for internal TLS
tlsInternal:
  enabled: false
  image:
    repository: envoyproxy/envoy
    tag: v1.36.4
    pullPolicy: IfNotPresent
  resources: {}
  # Certificate configuration
  certificates:
    # cert-manager issuer reference
    issuerRef:
      name: "internal-ca-issuer"
      kind: "ClusterIssuer"
    # Private key configuration
    privateKey:
      algorithm: ECDSA
      size: 256
      encoding: PKCS8
    # Duration of certificates
    duration: 8760h  # 1 year
    # Renew before expiry
    renewBefore: 720h  # 30 days
    # CA certificate for upstream TLS validation.
    # By default, ca.crt is read from a separate secret (e.g. copied from the CA
    # or provided by an external PKI). Set bundled=true to fall back to using
    # the ca.crt that cert-manager bundles into each per-component TLS secret.
    ca:
      bundled: false
      secretName: "internal-ca-cert"
      key: "ca.crt"
  # Port mappings for Envoy listeners
  ports:
    # Envoy admin port (for health checks)
    admin: 9901
    # Secure listener ports (external facing)
    secureHttp: 8443
    secureGrpc: 50443
    # Local egress ports (app connects here, envoy does TLS upstream)
    egressHttp: 15001
    egressGrpc: 15002
  # Route /api requests directly from the front Envoy to the API backend.
  # This is good for cases where the frontend Envoy sidecar is used to terminate
  # external traffic and needs some backend-provided endpoints - for example,
  # for OIDC redirection.
  frontendProxiesBackend: true
  # Log level for Envoy
  logLevel: info

imagePullSecrets: []

api:
  name: governor-api
  image:
    repository: synthesizedio/synthesized-api
    pullPolicy: Always
  # securityContext:
  #   runAsNonRoot: true
  #   runAsUser: null
  #   fsGroup: 1000660000
  #   fsGroupChangePolicy: "OnRootMismatch"
  #   seccompProfile:
  #     type: RuntimeDefault
  securityContext: null
  container:
    port: 8081
    grpcPort: 50055
    config:
      SPRING_PROFILES_ACTIVE: production
      VERSION: 'not-specified'
    # DEPRECATED: Sensitive configuration variables that will be rendered as a new secret
    # This configuration is preserved for backwards compatibility only.
    secretConfig: {}
    # Environment variables sourced from an external secret (e.g. Vault, ESO)
    secretEnv:
      - name: SPRING_DATASOURCE_URL
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: SPRING_DATASOURCE_URL
      - name: SPRING_DATASOURCE_USERNAME
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: SPRING_DATASOURCE_USERNAME
      - name: SPRING_DATASOURCE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: SPRING_DATASOURCE_PASSWORD
      - name: JWT_SECRET
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: JWT_SECRET
      - name: ADMIN_EMAIL
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: ADMIN_EMAIL
      - name: ADMIN_DEFAULT_PASSWORD
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: ADMIN_DEFAULT_PASSWORD
  # Extra volume mounts for the api container
  # extraVolumeMounts:
  #   - name: my-secret
  #     mountPath: /mnt/secrets
  #     readOnly: true
  # Extra pod-level volumes
  # extraVolumes:
  #   - name: my-secret
  #     secret:
  #       secretName: my-secret-name
  #       defaultMode: 420
  persistence:
    enabled: false
    name: api-pv
    mountPath: /data
    claimName: api-pvc
    size: 10Gi
    storageClassName: ""
  service:
    type: ClusterIP
    port: 80
    grpcPort: 50055
  tlsInternal:
    certificate:
      # commonName: governor-api
      # dnsNames:
      #   - governor-api.governor.svc.cluster.local
      # usages:
      #   - server auth

front:
  name: governor-front
  image:
    repository: synthesizedio/synthesized-front
    pullPolicy: Always
  # securityContext:
  #   runAsNonRoot: true
  #   runAsUser: null
  #   fsGroup: 1000660000
  #   fsGroupChangePolicy: "OnRootMismatch"
  securityContext: null
  container:
    port: 8080
    config:
      # private hosts
      API_INTERNAL_HOST: 'governor-api'
      API_GRPC_INTERNAL_PORT: '50055'
      API_HTTP_INTERNAL_PORT: '80'
      UI_PII_SCAN: "true"
      UI_WORKFLOW_WIZARD: "true"
    secretConfig:
      POSTHOG_ANALYTICS_API_KEY: ""
  # Extra volume mounts for the front container
  # extraVolumeMounts:
  #   - name: my-secret
  #     mountPath: /mnt/secrets
  #     readOnly: true
  # Extra pod-level volumes
  # extraVolumes:
  #   - name: my-secret
  #     secret:
  #       secretName: my-secret-name
  #       defaultMode: 420
  service:
    type: ClusterIP
    port: 80
  tlsInternal:
    certificate:
      # commonName: governor-front
      # dnsNames:
      #   - governor-front.governor.svc.cluster.local
      # usages:
      #   - server auth

worker:
  name: governor-worker
  image:
    repository: synthesizedio/synthesized-worker
    pullPolicy: Always
  # securityContext:
  #   runAsNonRoot: true
  #   runAsUser: null
  #   fsGroup: 1000660000
  #   fsGroupChangePolicy: "OnRootMismatch"
  securityContext: null
  container:
    config:
      WORKER_SERVERHOST: 'governor-api'
      WORKER_SERVERPORT: '50055'
      WORKER_TAGS: 'default'
      WORKER_DATASOURCES: '*'
      WORKER_USEPLAINTEXT: "true"
      WORKER_CONNECTIONS_POOL_SIZE: '20'
  # Extra volume mounts for the worker container
  # extraVolumeMounts:
  #   - name: my-secret
  #     mountPath: /mnt/secrets
  #     readOnly: true
  # Extra pod-level volumes
  # extraVolumes:
  #   - name: my-secret
  #     secret:
  #       secretName: my-secret-name
  #       defaultMode: 420
  persistence:
    enabled: false
    name: worker-pv
    mountPath: /app/rocksdb
    claimName: worker-pvc
    size: 10Gi
    storageClassName: ""
  tlsInternal:
    certificate:
      # commonName: governor-worker
      # dnsNames:
      #   - governor-worker.governor.svc.cluster.local
      # usages:
      #   - server auth

# DEPRECATED: legacy `agent:` overrides are merged on top of `worker:` for
# backward compatibility. Legacy values take precedence for any field they
# specify. To keep your existing K8s deployment name on upgrade, set
# `agent.name: governor-agent` (or your custom name).
# agent: {}

director:
  name: governor-director
  image:
    repository: synthesized.azurecr.io/synthesized-director
    pullPolicy: Always
  container:
    port: 50051
    config:
      OPENAI_API_VERSION: "2023-03-15-preview"
      AZURE_DEPLOYMENT: "gpt-35-turbo"
      AZURE_OPENAI_ENDPOINT: "https://director-openai.openai.azure.com/"
    secretConfig:
      AZURE_OPENAI_API_KEY: ""
      DATABASE_URL_POSTGRES: ""
    command:
      - python3.9
      - director/server.py
    healthchecks:
  service:
    type: ClusterIP
    port: 50051

nodeSelector: {}

tolerations: []

affinity: {}

ingress:
  enabled: false
  annotations:
    kubernetes.io/ingress.class: webapprouting.kubernetes.azure.com
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: example.synthesized.io
      paths:
        - path: /
          service: governor-front
          servicePort: 80
        - path: /api
          service: governor-api
          servicePort: 8081
  tls:
    - secretName: tls-secret
      hosts:
        - example.synthesized.io

grpcIngress:
  enabled: false
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    kubernetes.io/ingress.class: webapprouting.kubernetes.azure.com
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: grpc.example.synthesized.io
      paths:
        - path: /api
          service: governor-api
          servicePort: 50055
  tls:
    - secretName: grpc-tls-secret
      hosts:
        - grpc.example.synthesized.io
