mode: self-hosted
sandbox: false
# Enables OpenShift-friendly mounts for nginx; auto-detected in templates via route.openshift.io.
openShiftEnabled: false

# ============================================================================
# Internal default sections — DO NOT MODIFY
# ----------------------------------------------------------------------------
# These sections hold the chart's defaults for fields where customer overrides
# under the customer-facing `worker:` / `tdkWorkers:` keys cannot be detected
# separately from values.yaml defaults. The chart helper merges them in like
# this:
#
#   defaults < legacy `agent:` overrides < new `worker:` overrides
#
# When the customer's values file has any `agent:` keys, the chart uses the
# `_legacyAgentDefaults` block as the base so existing K8s resources keep
# their old names, image, env vars, and PVC. Otherwise it uses
# `_workerDefaults`. Customer overrides under `worker:` and `agent:` are
# applied on top.
#
# To customise, add a `worker:` (or `tdkWorkers:`) block below — do NOT edit
# the `_*Defaults` sections.
# ============================================================================
_workerDefaults:
  name: governor-worker
  image:
    repository: synthesizedio/synthesized-worker
    pullPolicy: Always
  securityContext: null
  container:
    config:
      WORKER_SERVERHOST: 'governor-api'
      WORKER_SERVERPORT: '50055'
      WORKER_TAGS: 'default'
      WORKER_DATASOURCES: '*'
      WORKER_USEPLAINTEXT: "true"
      WORKER_CONNECTIONS_POOL_SIZE: '20'
  persistence:
    enabled: false
    name: worker-pv
    mountPath: /app/rocksdb
    claimName: worker-pvc
    size: 10Gi
    storageClassName: ""
  tlsInternal:
    certificate: {}

_legacyAgentDefaults:
  name: governor-agent
  image:
    repository: synthesizedio/synthesized-agent
    pullPolicy: Always
  securityContext: null
  container:
    config:
      AGENT_SERVERHOST: 'governor-api'
      AGENT_SERVERPORT: '50055'
      AGENT_TAGS: 'default'
      AGENT_DATASOURCES: '*'
      AGENT_USEPLAINTEXT: "true"
      AGENT_CONNECTIONS_POOL_SIZE: '20'
  persistence:
    enabled: false
    name: agent-pv
    mountPath: /app/rocksdb
    claimName: agent-pvc
    size: 10Gi
    storageClassName: ""
  tlsInternal:
    certificate: {}

_tdkWorkersDefaults:
  enabled: true
  useByDefault: true
# ============================================================================
# End of internal defaults
# ============================================================================

# Feature flags shared across components.
# Override under `tdkWorkers:`. Legacy `tdkAgents:` overrides are still
# accepted and merged automatically.
# tdkWorkers:
#   enabled: true
#   useByDefault: true
s3Client:
  # forcePathStyle: true
  # protocol: "http"
  # region: "auto"
  # endpoint: "http://minio.governor.svc.cluster.local:9000"

# Envoy sidecar configuration for internal TLS
tlsInternal:
  enabled: false
  image:
    repository: envoyproxy/envoy
    tag: v1.36.4
    pullPolicy: IfNotPresent
  resources: {}
  # Certificate configuration
  certificates:
    # cert-manager issuer reference
    issuerRef:
      name: "internal-ca-issuer"
      kind: "ClusterIssuer"
    # Private key configuration
    privateKey:
      algorithm: ECDSA
      size: 256
      encoding: PKCS8
    # Duration of certificates
    duration: 8760h  # 1 year
    # Renew before expiry
    renewBefore: 720h  # 30 days
    # CA certificate for upstream TLS validation.
    # By default, ca.crt is read from a separate secret (e.g. copied from the CA
    # or provided by an external PKI). Set bundled=true to fall back to using
    # the ca.crt that cert-manager bundles into each per-component TLS secret.
    ca:
      bundled: false
      secretName: "internal-ca-cert"
      key: "ca.crt"
  # Port mappings for Envoy listeners
  ports:
    # Envoy admin port (for health checks)
    admin: 9901
    # Secure listener ports (external facing)
    secureHttp: 8443
    secureGrpc: 50443
    # Local egress ports (app connects here, envoy does TLS upstream)
    egressHttp: 15001
    egressGrpc: 15002
  # Route /api requests directly from the front Envoy to the API backend.
  # This is good for cases where the frontend Envoy sidecar is used to terminate
  # external traffic and needs some backend-provided endpoints - for example,
  # for OIDC redirection.
  frontendProxiesBackend: true
  # Log level for Envoy
  logLevel: info

imagePullSecrets: []

api:
  name: governor-api
  image:
    repository: synthesizedio/synthesized-api
    pullPolicy: Always
  # securityContext:
  #   runAsNonRoot: true
  #   runAsUser: null
  #   fsGroup: 1000660000
  #   fsGroupChangePolicy: "OnRootMismatch"
  #   seccompProfile:
  #     type: RuntimeDefault
  securityContext: null
  container:
    port: 8081
    grpcPort: 50055
    config:
      SPRING_PROFILES_ACTIVE: production
      VERSION: 'not-specified'
    # DEPRECATED: Sensitive configuration variables that will be rendered as a new secret
    # This configuration is preserved for backwards compatibility only.
    secretConfig: {}
    # Environment variables sourced from an external secret (e.g. Vault, ESO)
    secretEnv:
      - name: SPRING_DATASOURCE_URL
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: SPRING_DATASOURCE_URL
      - name: SPRING_DATASOURCE_USERNAME
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: SPRING_DATASOURCE_USERNAME
      - name: SPRING_DATASOURCE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: SPRING_DATASOURCE_PASSWORD
      - name: JWT_SECRET
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: JWT_SECRET
      - name: ADMIN_EMAIL
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: ADMIN_EMAIL
      - name: ADMIN_DEFAULT_PASSWORD
        valueFrom:
          secretKeyRef:
            name: governor-api-secret
            key: ADMIN_DEFAULT_PASSWORD
  # Extra volume mounts for the api container
  # extraVolumeMounts:
  #   - name: my-secret
  #     mountPath: /mnt/secrets
  #     readOnly: true
  # Extra pod-level volumes
  # extraVolumes:
  #   - name: my-secret
  #     secret:
  #       secretName: my-secret-name
  #       defaultMode: 420
  persistence:
    enabled: false
    name: api-pv
    mountPath: /data
    claimName: api-pvc
    size: 10Gi
    storageClassName: ""
  service:
    type: ClusterIP
    port: 80
    grpcPort: 50055
  tlsInternal:
    certificate:
      # commonName: governor-api
      # dnsNames:
      #   - governor-api.governor.svc.cluster.local
      # usages:
      #   - server auth

front:
  name: governor-front
  image:
    repository: synthesizedio/synthesized-front
    pullPolicy: Always
  # securityContext:
  #   runAsNonRoot: true
  #   runAsUser: null
  #   fsGroup: 1000660000
  #   fsGroupChangePolicy: "OnRootMismatch"
  securityContext: null
  container:
    port: 8080
    config:
      # private hosts
      API_INTERNAL_HOST: 'governor-api'
      API_GRPC_INTERNAL_PORT: '50055'
      API_HTTP_INTERNAL_PORT: '80'
      UI_PII_SCAN: "true"
      UI_WORKFLOW_WIZARD: "true"
    secretConfig:
      POSTHOG_ANALYTICS_API_KEY: ""
  # Extra volume mounts for the front container
  # extraVolumeMounts:
  #   - name: my-secret
  #     mountPath: /mnt/secrets
  #     readOnly: true
  # Extra pod-level volumes
  # extraVolumes:
  #   - name: my-secret
  #     secret:
  #       secretName: my-secret-name
  #       defaultMode: 420
  service:
    type: ClusterIP
    port: 80
  tlsInternal:
    certificate:
      # commonName: governor-front
      # dnsNames:
      #   - governor-front.governor.svc.cluster.local
      # usages:
      #   - server auth

# Worker (formerly "agent") configuration.
#
# Defaults are applied by the chart helper and only need to be listed here
# when you want to override them. The reference defaults are:
#
#   worker:
#     name: governor-worker
#     image:
#       repository: synthesizedio/synthesized-worker
#       pullPolicy: Always
#     securityContext: null
#     container:
#       config:
#         WORKER_SERVERHOST: 'governor-api'
#         WORKER_SERVERPORT: '50055'
#         WORKER_TAGS: 'default'
#         WORKER_DATASOURCES: '*'
#         WORKER_USEPLAINTEXT: "true"
#         WORKER_CONNECTIONS_POOL_SIZE: '20'
#     persistence:
#       enabled: false
#       name: worker-pv
#       mountPath: /app/rocksdb
#       claimName: worker-pvc
#       size: 10Gi
#       storageClassName: ""
#
# Extra volume mounts and volumes are also supported via:
#   worker:
#     container:
#       extraVolumeMounts: []
#     extraVolumes: []
#
# DEPRECATED: legacy `agent:` key. If your existing values file uses `agent:`
# the chart will automatically preserve the OLD defaults (governor-agent,
# synthesized-agent, AGENT_* env vars, agent-pvc) so the upgrade does not
# rename or recreate live K8s resources. Migrate to `worker:` at your own
# pace; the structure is identical.
# worker: {}

director:
  name: governor-director
  image:
    repository: synthesized.azurecr.io/synthesized-director
    pullPolicy: Always
  container:
    port: 50051
    config:
      OPENAI_API_VERSION: "2023-03-15-preview"
      AZURE_DEPLOYMENT: "gpt-35-turbo"
      AZURE_OPENAI_ENDPOINT: "https://director-openai.openai.azure.com/"
    secretConfig:
      AZURE_OPENAI_API_KEY: ""
      DATABASE_URL_POSTGRES: ""
    command:
      - python3.9
      - director/server.py
    healthchecks:
  service:
    type: ClusterIP
    port: 50051

nodeSelector: {}

tolerations: []

affinity: {}

ingress:
  enabled: false
  annotations:
    kubernetes.io/ingress.class: webapprouting.kubernetes.azure.com
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: example.synthesized.io
      paths:
        - path: /
          service: governor-front
          servicePort: 80
        - path: /api
          service: governor-api
          servicePort: 8081
  tls:
    - secretName: tls-secret
      hosts:
        - example.synthesized.io

grpcIngress:
  enabled: false
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    kubernetes.io/ingress.class: webapprouting.kubernetes.azure.com
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: grpc.example.synthesized.io
      paths:
        - path: /api
          service: governor-api
          servicePort: 50055
  tls:
    - secretName: grpc-tls-secret
      hosts:
        - grpc.example.synthesized.io
